<!DOCTYPE html>
<html lang="en">
<head>

<body class="landing-page">

  <!-- ═══════════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════ -->
  <nav class="navbar">
    <div class="nav-icons">
      <a href="menu.html" class="nav-icon-btn" title="View Menu" aria-label="View Menu">
        <svg class="icon-img" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

  <section class="hero">
    <!-- Background food image (30% opacity) -->
    <div class="hero-bg">
      <img src="assets/images/hero-bg.jpg" alt="" />

    <!-- Hero content -->
    <div class="hero-content">

        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>

      <!-- Main heading -->
      <h1 class="hero-title">
        Fast Casual<br />Kitchen
      </h1>

      <!-- Tagline -->
      <p class="hero-tagline">Fresh. Fast. Customizable.</p>

      <!-- Description -->
      <p class="hero-desc">
        Build your perfect meal with our fresh ingredients and bold<br />
        flavors. Order in minutes, enjoy in seconds.
      </p>

      <!-- CTA button -->
      <a href="menu.html" class="btn-order-now">Order Now</a>
