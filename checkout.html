<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Complete your order and enter payment details at Fast Casual Kitchen.">
  <title>Checkout — Fast Casual Kitchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="checkout-page">

  <!-- HEADER -->
   <!-- ═══════════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════ -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-back">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
    </div>
    <div class="nav-icons">
      <a href="menu.html" class="nav-icon-btn" title="View Menu" aria-label="View Menu">
        <svg class="icon-img" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span class="nav-label">view menu</span>
      </a>
      <a href="Cart.html" class="nav-icon-btn" title="Cart" aria-label="Cart" id="cart-btn">
        <svg class="icon-img" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </a>
    </div>
  </nav>

  <!-- ORDER SUMMARY -->
  <div class="summary-box">
    <h5>Order Summary</h5>

    <div class="row-line">
      <span>Estimated Subtotal</span>
      <span>$ 36.81</span>
    </div>

    <div class="row-line">
      <span>Delivery Fee</span>
      <span>$ 2.49</span>
    </div>

    <div class="row-line total">
      <span>Total</span>
      <span>$39.30</span>
    </div>
  </div>

  <!-- PERSONAL DETAILS -->
  <h6 class="section-title">Personal Details</h6>

  <div class="form-group">
    <label class="form-label">First name</label>
    <input type="text" class="form-control" placeholder="Enter First Name">
  </div>

  <div class="form-group">
    <label class="form-label">Last name</label>
    <input type="text" class="form-control" placeholder="Enter Last Name">
  </div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" placeholder="Your Email">
  </div>

  <div class="form-group">
    <label class="form-label">Phone number</label>
    <input type="tel" class="form-control" placeholder="Enter Phone Number">
  </div>

  <!-- PAYMENT -->
  <h6 class="section-title">Payment Details</h6>

  <div class="payment-icons">
    <button class="pay-option">VISA</button>
    <button class="pay-option">PayPal</button>
    <button class="pay-option">Mastercard</button>
  </div>

  <div class="form-group">
    <label class="form-label">Card holder name</label>
    <input class="form-control" placeholder="Enter Full Name">
  </div>

  <div class="form-group">
    <label class="form-label">Card number</label>
    <input class="form-control" placeholder="Ex: **** **** **** ***">
  </div>

  <div class="form-group">
    <label class="form-label">CVV</label>
    <input class="form-control" placeholder="Ex: 4567">
  </div>

  <div class="form-group">
    <label class="form-label">Expiration Date</label>
    <input class="form-control" placeholder="MM/YY">
  </div>

  <!-- ADDRESS -->
  <h6 class="section-title">Address</h6>

  <select class="address-dropdown form-select">
    <option>Current location</option>
  </select>

  <!-- ACTION BUTTONS -->
  <button class="confirm btn" onclick="processPayment()">
    Confirm
  </button>

  <button class="cancel btn" onclick="window.location.href='menu.html'">
    Cancel
  </button>

</div>
<!-- SCRIPT -->
<script>
function processPayment() {
  alert("Processing your credit card information...");
  setTimeout(function() {
    window.location.href = "thankyou.html";
  }, 1200);
}
</script>

</body>
</html>
